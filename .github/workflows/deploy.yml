name: Deploy to Zerops

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zcli
        run: curl -sSL https://zerops.io/zcli/install.sh | sh

      - name: Deploy to appstage
        run: ~/.local/bin/zcli push --serviceId p1MjeMT7QxeH4iJHfNCJLQ --setup prod
        env:
          ZEROPS_TOKEN: ${{ secrets.ZEROPS_TOKEN }}
